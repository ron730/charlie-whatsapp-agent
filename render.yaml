services:
  - type: web
    name: charlie-whatsapp-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GREEN_API_URL
        sync: false
      - key: GREEN_API_INSTANCE
        sync: false
      - key: GREEN_API_TOKEN
        sync: false
      - key: LLM_PROVIDER
        value: anthropic
      - key: LLM_MODEL
        value: claude-haiku-4-5
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_PATH
        value: /data/conversations.db
      - key: MAX_HISTORY
        value: "20"
    disk:
      name: charlie-data
      mountPath: /data
      sizeGB: 1
